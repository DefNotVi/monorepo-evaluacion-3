apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-despacho
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front-despacho
  template:
    metadata:
      labels:
        app: front-despacho
    spec:
      containers:
      - name: front-despacho
        image: 306299936055.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: front-despacho-service
  namespace: default
spec:
  type: LoadBalancer # Crea automáticamente un Application/Network Load Balancer en AWS
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: front-despacho
