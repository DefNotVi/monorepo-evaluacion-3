apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-ventas
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back-ventas
  template:
    metadata:
      labels:
        app: back-ventas
    spec:
      containers:
      - name: back-ventas
        image: 306299936055.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080 # <-- CAMBIADO A 8080 (Puerto correspondiente a Ventas)
        env:                  # <-- BLOQUE DE VARIABLES INYECTADO
        - name: DB_ENDPOINT
          value: "mysql-service"
        - name: DB_PORT
          value: "3306"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "innovatech2026"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/innovatech?allowPublicKeyRetrieval=true&useSSL=false"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: back-ventas-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8080       # <-- CAMBIADO A 8080
    targetPort: 8080 # <-- CAMBIADO A 8080
  selector:
    app: back-ventas
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: back-ventas-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: back-ventas
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
