name: Deploy to Amazon EKS

on:
  push:
    branches:
      - main  # Cambia a master si tu rama en GitHub se llama así

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: innovatech-eks
  AWS_ACCOUNT_ID: "306299936055"

jobs:
  build-and-deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Configurar las credenciales de AWS usando Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. Autenticarse en Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # 4. Construir y subir las imágenes Docker al ECR
    - name: Build and Push Docker Images
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        IMAGE_TAG=${{ github.sha }}
        
        # 1. Build y Push de Back Ventas (Mapeado a innovatech-backend)
        docker build -t $ECR_REGISTRY/innovatech-backend:$IMAGE_TAG ./back-ventas-springboot/api-rest-ventas
        docker build -t $ECR_REGISTRY/innovatech-backend:latest ./back-ventas-springboot/api-rest-ventas
        docker push $ECR_REGISTRY/innovatech-backend:$IMAGE_TAG
        docker push $ECR_REGISTRY/innovatech-backend:latest
        
        # 2. Build y Push de Back Despachos (Usamos la url de innovatech-db para cumplir con el tercer ECR creado por Terraform)
        docker build -t $ECR_REGISTRY/innovatech-db:$IMAGE_TAG ./back-despachos-springboot/api-rest-despacho
        docker build -t $ECR_REGISTRY/innovatech-db:latest ./back-despachos-springboot/api-rest-despacho
        docker push $ECR_REGISTRY/innovatech-db:$IMAGE_TAG
        docker push $ECR_REGISTRY/innovatech-db:latest
        
        # 3. Build y Push de Front Despacho (Mapeado a innovatech-frontend)
        docker build -t $ECR_REGISTRY/innovatech-frontend:$IMAGE_TAG ./front-despacho
        docker build -t $ECR_REGISTRY/innovatech-frontend:latest ./front-despacho
        docker push $ECR_REGISTRY/innovatech-frontend:$IMAGE_TAG
        docker push $ECR_REGISTRY/innovatech-frontend:latest

    # 5. Configurar kubectl para conectarse al clúster de AWS EKS
    - name: Update Kubeconfig
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

    # 6. Desplegar los manifiestos en Kubernetes
    - name: Deploy to EKS Cluster
      run: |
        if [ -d "./k8s" ]; then
          kubectl apply -f ./k8s/
        else
          echo "La carpeta /k8s no existe todavía. Saltando despliegue de manifiestos por ahora."
        fi
